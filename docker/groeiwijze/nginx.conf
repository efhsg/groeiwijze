map $arg_wt $wt_suffix {
    default "";
    "~^[a-zA-Z0-9_-]{1,100}$" $arg_wt;
}

map $wt_suffix $wt_root {
    default /var/www/projects/groeiwijze.nl;
    "~^(.+)$" /var/www/projects/groeiwijze.nl-$1;
}

map $wt_suffix $asset_cache_control {
    default "public, immutable";
    "~^.+$" "no-store";
}

map $wt_suffix $asset_expires {
    default 1y;
    "~^.+$" off;
}

server {
    listen 80;
    server_name _;
    root $wt_root/website;
    index index.html index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # PHP handling for contact form - use Docker-specific version.
    location = /contact-submit.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/docker-contact-submit.php;
    }

    # Dev-only worktree list endpoint. Other PHP files remain non-executable.
    location = /_wt/list.php {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/_wt/list.php;
    }

    # Dev-only worktree switcher. This route never resolves from a worktree root.
    location = /_wt/switcher.js {
        root /var/www;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Cache-Control "no-cache" always;
        try_files /_wt/switcher.js =404;
    }

    # Deny every other _wt path; list.php and switcher.js are exact allow-list routes.
    location ^~ /_wt/ {
        return 404;
    }

    # Block access to private files before static regex locations are considered.
    location ^~ /private/ {
        deny all;
        return 404;
    }

    # Static files caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires $asset_expires;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Cache-Control $asset_cache_control always;
        disable_symlinks on from=$document_root;
        try_files $uri @main_static;
    }

    # Block other PHP files
    location ~ \.php$ {
        deny all;
        return 404;
    }

    # Default handling
    location / {
        sub_filter_once on;
        sub_filter '</body>' '<script src="/_wt/switcher.js" defer></script></body>';
        disable_symlinks on from=$document_root;
        try_files $uri $uri/ @main;
    }

    location @main {
        root /var/www/projects/groeiwijze.nl/website;
        sub_filter_once on;
        sub_filter '</body>' '<script src="/_wt/switcher.js" defer></script></body>';
        disable_symlinks on from=$document_root;
        try_files $uri $uri/ =404;
    }

    location @main_static {
        root /var/www/projects/groeiwijze.nl/website;
        expires $asset_expires;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Cache-Control $asset_cache_control always;
        disable_symlinks on from=$document_root;
        try_files $uri =404;
    }

    # Error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}
