services:
  groeiwijze:
    build:
      context: ./docker/groeiwijze
      dockerfile: Dockerfile
    container_name: groeiwijze
    ports:
      - "8001:80"
    volumes:
      - ./website:/var/www/html:ro
    environment:
      - SMTP_HOST=${SMTP_HOST:-mail.groeiwijze.nl}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_SKIP_VERIFY=${SMTP_SKIP_VERIFY:-false}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Groeiwijze}
      - MAIL_TO=${MAIL_TO}
      - RATE_LIMIT_SALT=${RATE_LIMIT_SALT:-groeiwijze_ratelimit_2024}
    restart: unless-stopped

  # dev-only — niet bedoeld voor productie. Productie draait geen Docker;
  # dit compose-bestand wordt op de hosting niet uitgevoerd.
  # Plaintext SMTP is bewust: de container-to-container loopback binnen het
  # compose-netwerk heeft geen man-in-the-middle om tegen te beschermen.
  mailcatcher:
    image: axllent/mailpit:latest
    container_name: groeiwijze_mailcatcher
    ports:
      # Web-UI alleen op localhost; Tailscale-Serve publiceert extern op 8444.
      - "127.0.0.1:8025:8025"
      # SMTP-poort 1025 alleen intern bereikbaar binnen het compose-netwerk —
      # geen host-publicatie zodat geen extern proces direct mail kan posten.
    environment:
      - MP_SMTP_AUTH_ACCEPT_ANY=true
      - MP_SMTP_AUTH_ALLOW_INSECURE=true
      - MP_MAX_MESSAGES=500
    restart: unless-stopped
