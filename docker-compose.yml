services:
  groeiwijze:
    build:
      context: ./docker/groeiwijze
      dockerfile: Dockerfile
    container_name: groeiwijze
    ports:
      - "8001:80"
    volumes:
      - ./website:/var/www/html:ro
      - ./docker/groeiwijze/php-config:/var/www/private:ro
    environment:
      - SMTP_HOST=${SMTP_HOST:-mail.groeiwijze.nl}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Groeiwijze}
      - MAIL_TO=${MAIL_TO}
      - RATE_LIMIT_SALT=${RATE_LIMIT_SALT:-groeiwijze_ratelimit_2024}
    restart: unless-stopped
